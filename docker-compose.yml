name: openmonetis-pe

services:
  db:
    image: postgres:18-alpine
    container_name: openmonetis_pe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openmonetis_pe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openmonetis_pe_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-openmonetis_pe_db}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openmonetis_pe} -d ${POSTGRES_DB:-openmonetis_pe_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: marcelorossini/openmonetis-pe:latest
    container_name: openmonetis_pe_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://openmonetis_pe:openmonetis_pe_dev_password@db:5432/openmonetis_pe_db}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
      JOBS_SECRET: ${JOBS_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  jobs:
    image: node:22-alpine
    container_name: openmonetis_pe_jobs
    restart: unless-stopped
    working_dir: /workspace
    command:
      - sh
      - -c
      - |
        if [ -f /workspace/scripts/jobs-loop.sh ]; then
          exec sh /workspace/scripts/jobs-loop.sh
        fi
        wget -q -O /tmp/jobs-loop.sh "$JOBS_SCRIPT_URL"
        exec sh /tmp/jobs-loop.sh
    volumes:
      - ./:/workspace:ro
    env_file:
      - path: .env
        required: false
    environment:
      JOBS_API_BASE_URL: http://app:3000
      JOBS_TARGET_PATH: /api/internal/jobs/recurring-financial-titles
      JOBS_INTERVAL_SECONDS: ${JOBS_INTERVAL_SECONDS:-86400}
      JOBS_RUN_ON_START: ${JOBS_RUN_ON_START:-true}
      JOBS_SECRET: ${JOBS_SECRET:-}
      JOBS_SCRIPT_URL: ${JOBS_SCRIPT_URL:-https://raw.githubusercontent.com/marcelorossini/openmonetis-pe/main/scripts/jobs-loop.sh}
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
